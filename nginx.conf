server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;
    sendfile on;
    tcp_nopush on;
    server_tokens off;

    # Si un proxy externo (Traefik, Caddy, Cloudflare) termina TLS, emitir
    # redirects con path relativo para que el navegador conserve el scheme
    # (https) y evitar el salto http -> https.
    absolute_redirect off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;

    # Activos inmutables de Quartz (hash en el nombre): cache largo
    location ~* \.(css|js|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|webp|avif|svg|mp4|webm)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # HTML: cache corto, revalidacion rapida
    location ~* \.html$ {
        expires 5m;
        add_header Cache-Control "public, max-age=300, must-revalidate";
        try_files $uri =404;
    }

    # Wikilinks / slugs sin extension -> sirve foo.html si existe
    location / {
        try_files $uri $uri.html $uri/index.html $uri/ =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Bloquear accesos a archivos ocultos
    location ~ /\.(?!well-known) {
        deny all;
    }
}
